server {
    listen 80;
    server_name intranet-knowledge.servehalflife.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name intranet-knowledge.servehalflife.com;

    ssl_certificate /etc/letsencrypt/live/intranet-knowledge.servehalflife.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/intranet-knowledge.servehalflife.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html index.htm;

    location /api/ {
        proxy_pass http://backend:80/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Aumentar timeouts para chatbot (60s PHP + buffer)
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri /index.html;
    }
}
