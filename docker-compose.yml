services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: frontend
    ports:
      - "80:80"

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  anythingllm:
    image: mintplexlabs/anythingllm:latest
    container_name: anythingllm
    ports:
      - "3001:3001"
    environment:
      STORAGE_DIR: /app/server/storage
      OLLAMA_BASE_PATH: http://ollama:11434
      DISABLE_TELEMETRY: "true"
    volumes:
      - anythingllm_storage:/app/server/storage
    depends_on:
      - ollama
    restart: unless-stopped

# Base de Datos 
  mongodb:
    image: mongo:latest
    container_name: mongodb_data
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./dum:/docker-entrypoint-initdb.d/dump:ro
      - ./mongodb/init-mongo.sh:/docker-entrypoint-initdb.d/init-mongo.sh:ro

  # API 
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api_backend
    ports:
      - "8080:80" 
    environment:
      ANYTHINGLLM_BASE_URL: ${ANYTHINGLLM_BASE_URL:-http://anythingllm:3001}
      ANYTHINGLLM_WORKSPACE_SLUG: ${ANYTHINGLLM_WORKSPACE_SLUG:-intranet-knowledge}
      ANYTHINGLLM_API_KEY: ${ANYTHINGLLM_API_KEY:-}
    depends_on:
      - mongodb
      - anythingllm

volumes:
  mongodb_data:
  anythingllm_storage:
  ollama_data:
