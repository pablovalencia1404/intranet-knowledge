services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: frontend
    ports:
      - "80:80"

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama_init
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "-lc"]
    command: >
      "sleep 5;
      ollama pull ${OLLAMA_MODEL:-llama3.2:1b}"
    environment:
      OLLAMA_HOST: http://ollama:11434
    restart: 'no'

  anythingllm:
    image: mintplexlabs/anythingllm:latest
    container_name: anythingllm
    ports:
      - "3001:3001"
    environment:
      STORAGE_DIR: /app/server/storage
      OLLAMA_BASE_PATH: http://ollama:11434
      DISABLE_TELEMETRY: "true"
    volumes:
      - anythingllm_storage:/app/server/storage
    depends_on:
      - ollama
    restart: unless-stopped

# Base de Datos 
  mongodb:
    image: mongo:latest
    container_name: mongodb_data
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./dum:/docker-entrypoint-initdb.d/dump:ro
      - ./mongodb/init-mongo.sh:/docker-entrypoint-initdb.d/init-mongo.sh:ro

  # API 
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api_backend
    ports:
      - "8080:80" 
    environment:
      ANYTHINGLLM_BASE_URL: ${ANYTHINGLLM_BASE_URL:-http://anythingllm:3001}
      ANYTHINGLLM_WORKSPACE_SLUG: ${ANYTHINGLLM_WORKSPACE_SLUG:-intranet-knowledge}
      ANYTHINGLLM_API_KEY: ${ANYTHINGLLM_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:1b}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-20}
      ANYTHINGLLM_TIMEOUT_SECONDS: ${ANYTHINGLLM_TIMEOUT_SECONDS:-15}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-18}
      CHATBOT_CONTEXT_MAX_CHARS: ${CHATBOT_CONTEXT_MAX_CHARS:-1200}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-1024}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-180}
    depends_on:
      - mongodb
      - anythingllm
      - ollama

volumes:
  mongodb_data:
  anythingllm_storage:
  ollama_data:
